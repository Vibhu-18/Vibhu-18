<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient: deep sea blue / ocean tones -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#012a3a"/>
      <stop offset="35%" stop-color="#014459"/>
      <stop offset="65%" stop-color="#016174"/>
      <stop offset="100%" stop-color="#01414d"/>
    </linearGradient>

    <!-- Border gradient -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD84D"/>
      <stop offset="50%" stop-color="#2e8b3a"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>

    <!-- Name text gradient -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="50%" stop-color="#FFC300"/>
      <stop offset="100%" stop-color="#FF8C42"/>
    </linearGradient>

    <!-- Globe wire gradient -->
    <radialGradient id="globeFill" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#7ec8e3" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#3d9bc4" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#0a2a3d" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.1"/>
    </radialGradient>

    <filter id="globeGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="cardClip">
      <rect x="4" y="4" width="892" height="312" rx="22"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <g clip-path="url(#cardClip)">
    <rect x="0" y="0" width="900" height="320" fill="url(#bgGrad)"/>

    <!-- floating particles -->
    <g fill="#FFD84D">
      <circle cx="80" cy="60" r="2"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.5s" repeatCount="indefinite"/></circle>
      <circle cx="820" cy="80" r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="760" cy="250" r="2.2"><animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite"/></circle>
      <circle cx="60" cy="270" r="1.8"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/></circle>
      <circle cx="440" cy="30" r="1.4"><animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.4s" repeatCount="indefinite"/></circle>
      <circle cx="700" cy="40" r="1.6" fill="#c0392b"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
      <circle cx="150" cy="290" r="1.6" fill="#2e8b3a"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    </g>

    <!-- Rotating globe, sitting behind the text -->
    <g transform="translate(700,165)" opacity="0.95" filter="url(#globeGlow)">
      <!-- outer glow ring for impressive contrast against the sea-blue bg -->
      <circle r="140" fill="none" stroke="#e8452c" stroke-width="1" opacity="0.25"/>
      <circle r="128" fill="url(#globeFill)"/>
      <circle r="128" fill="none" stroke="#c9e83c" stroke-width="2.4" opacity="0.95"/>

      <g>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="16s" repeatCount="indefinite"/>
        <!-- longitude lines: yellowish-green -->
        <ellipse rx="128" ry="128" fill="none" stroke="#c9e83c" stroke-width="2"/>
        <ellipse rx="96" ry="128" fill="none" stroke="#a4d334" stroke-width="1.8" opacity="0.95"/>
        <ellipse rx="58" ry="128" fill="none" stroke="#a4d334" stroke-width="1.8" opacity="0.9"/>
        <ellipse rx="20" ry="128" fill="none" stroke="#c9e83c" stroke-width="1.8" opacity="0.85"/>
        <!-- latitude lines: reddish -->
        <ellipse rx="128" ry="96" fill="none" stroke="#e8452c" stroke-width="1.8" opacity="0.9"/>
        <ellipse rx="128" ry="58" fill="none" stroke="#ff6b4a" stroke-width="1.8" opacity="0.9"/>
        <ellipse rx="128" ry="20" fill="none" stroke="#ff6b4a" stroke-width="1.8" opacity="0.9"/>
        <ellipse rx="128" ry="-58" fill="none" stroke="#ff6b4a" stroke-width="1.8" opacity="0.9"/>
        <ellipse rx="128" ry="-96" fill="none" stroke="#e8452c" stroke-width="1.8" opacity="0.9"/>
      </g>

      <circle r="4.5" fill="#c9e83c">
        <animateMotion dur="16s" repeatCount="indefinite" path="M128,0 A128,128 0 1,1 -128,0 A128,128 0 1,1 128,0"/>
      </circle>
      <circle r="3.5" fill="#ff6b4a">
        <animateMotion dur="16s" repeatCount="indefinite" begin="-4s" path="M0,128 A128,128 0 1,1 0,-128 A128,128 0 1,1 0,128"/>
      </circle>

      <!-- thin outer orbit ring, counter-rotating for extra depth -->
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="24s" repeatCount="indefinite"/>
        <ellipse rx="150" ry="55" fill="none" stroke="#c9e83c" stroke-width="1" opacity="0.35"/>
      </g>
    </g>

    <!-- Outer border -->
    <rect x="4" y="4" width="892" height="312" rx="22" fill="none" stroke="url(#borderGrad)" stroke-width="3">
      <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Main content -->
    <g filter="url(#glow)">
      <text x="50" y="105" font-family="Segoe UI, Verdana, sans-serif" font-size="46" font-weight="800" fill="url(#nameGrad)">
        Vibhuti Sharma
      </text>
    </g>

    <!-- typewriter-style cycling role line -->
    <g font-family="Consolas, Menlo, monospace" font-size="20" font-weight="600" fill="#F2F2F2">
      <text x="52" y="140" opacity="0">
        Full-Stack Dev | Agentic AI Builder
        <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.05;0.22;0.25;1" dur="12s" repeatCount="indefinite" begin="0s"/>
      </text>
      <text x="52" y="140" opacity="0">
        B.Tech CSE (AI) | IBM SkillsBuild AI Intern
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.30;0.47;0.50;1" dur="12s" repeatCount="indefinite" begin="0s"/>
      </text>
      <text x="52" y="140" opacity="0">
        Ex-Microsoft Elevate AI Intern | Ex-ServiceNow Intern
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.50;0.55;0.72;0.75;1" dur="12s" repeatCount="indefinite" begin="0s"/>
      </text>
      <text x="52" y="140" opacity="0">
        SIH'25 Team Lead | AWS Student Builder Group
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.75;0.80;0.97;1" dur="12s" repeatCount="indefinite" begin="0s"/>
      </text>
    </g>

    <!-- underline accent -->
    <rect x="52" y="150" width="0" height="3" fill="#c0392b">
      <animate attributeName="width" values="0;340;340;0" keyTimes="0;0.15;0.85;1" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- tag chips -->
    <g font-family="Segoe UI, Verdana, sans-serif" font-size="14" font-weight="600">
      <g>
        <rect x="52" y="180" rx="14" ry="14" width="220" height="30" fill="#0e3d1f" stroke="#2e8b3a"/>
        <text x="68" y="200" fill="#FFD84D">Open-Source Aspiring AI Eng</text>
      </g>
      <g>
        <rect x="282" y="180" rx="14" ry="14" width="150" height="30" fill="#3d1010" stroke="#c0392b"/>
        <text x="298" y="200" fill="#FFD84D">EDC IIT Delhi CA</text>
      </g>
      <g>
        <rect x="52" y="220" rx="14" ry="14" width="200" height="30" fill="#0e3d1f" stroke="#2e8b3a"/>
        <text x="68" y="240" fill="#FFD84D">NLP • GenAI • Agentic AI</text>
      </g>
      <g>
        <rect x="262" y="220" rx="14" ry="14" width="170" height="30" fill="#3d1010" stroke="#c0392b"/>
        <text x="278" y="240" fill="#FFD84D">Python | AI Web Apps</text>
      </g>
    </g>

    <!-- footer tagline -->
    <text x="52" y="285" font-family="Segoe UI, Verdana, sans-serif" font-size="15" font-style="italic" fill="#c9c9c9">
      "Let's connect and build the future with AI" 🚀
    </text>
  </g>
</svg>
